openapi: 3.1.0
info:
  title: FSMA 204 Traceability Workflow API
  version: 0.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: Readiness workflow contract for human-reviewed FSMA 204 traceability records; not compliance certification, legal advice, or FDA endorsement.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /api/traceability/lots:
    get:
      operationId: listTraceabilityLots
      summary: List traceability lots
      responses:
        "200": { description: Traceability lots, content: { application/json: { schema: { $ref: "#/components/schemas/TraceLotList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      operationId: createTraceabilityLot
      summary: Create a traceability lot
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TraceLotCreate" } } } }
      responses:
        "201": { description: Traceability lot created, content: { application/json: { schema: { $ref: "#/components/schemas/TraceLot" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/events:
    get:
      operationId: listTraceabilityEvents
      summary: List traceability events
      responses:
        "200": { description: Traceability events, content: { application/json: { schema: { $ref: "#/components/schemas/TraceEventList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      operationId: createTraceabilityEvent
      summary: Create a receiving, transformation, or shipping event
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TraceEventCreate" } } } }
      responses:
        "201": { description: Traceability event created, content: { application/json: { schema: { $ref: "#/components/schemas/TraceEvent" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/exceptions:
    get:
      operationId: listTraceabilityExceptions
      summary: List human-review exceptions
      responses:
        "200": { description: Exceptions, content: { application/json: { schema: { $ref: "#/components/schemas/ExceptionList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/exceptions/{exceptionId}:
    patch:
      operationId: updateTraceabilityException
      summary: Update exception review status
      parameters:
        - { $ref: "#/components/parameters/ExceptionId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ExceptionPatch" } } } }
      responses:
        "200": { description: Exception updated, content: { application/json: { schema: { $ref: "#/components/schemas/ExceptionRecord" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/supplier-requests:
    get:
      operationId: listSupplierRequests
      summary: List supplier KDE requests
      responses:
        "200": { description: Supplier requests, content: { application/json: { schema: { $ref: "#/components/schemas/SupplierRequestList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      operationId: createSupplierRequest
      summary: Create a supplier KDE request
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SupplierRequestCreate" } } } }
      responses:
        "201": { description: Supplier request created, content: { application/json: { schema: { $ref: "#/components/schemas/SupplierRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/supplier-requests/{supplierRequestId}:
    patch:
      operationId: updateSupplierRequest
      summary: Update supplier request status
      parameters:
        - { $ref: "#/components/parameters/SupplierRequestId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SupplierRequestPatch" } } } }
      responses:
        "200": { description: Supplier request updated, content: { application/json: { schema: { $ref: "#/components/schemas/SupplierRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/mock-recalls:
    post:
      operationId: createMockRecall
      summary: Start a human-reviewed mock recall readiness run
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MockRecallCreate" } } } }
      responses:
        "201": { description: Mock recall created, content: { application/json: { schema: { $ref: "#/components/schemas/MockRecall" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/mock-recalls/{mockRecallId}:
    get:
      operationId: getMockRecall
      summary: Get mock recall readiness status
      parameters: [{ $ref: "#/components/parameters/MockRecallId" }]
      responses:
        "200":
          description: Mock recall readiness detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockRecallDetail" }
              examples:
                contractFixture:
                  summary: Contract fixture for readiness behavior checks
                  value:
                    mockRecallId: contract-fixture-ready-for-review
                    status: ready_for_human_review
                    scope:
                      productDescription: Fresh-cut melon cup
                      traceabilityLotCode: TLC-FC-2026-05-READY
                      dateRangeStart: "2026-05-01"
                      dateRangeEnd: "2026-05-07"
                    readinessSummary:
                      affectedLotCount: 1
                      affectedShipmentCount: 2
                      openExceptionCount: 1
                      supplierRequestCount: 1
                      humanReviewRequired: true
                      humanReviewReasons: [supplier_kde_gap, lot_code_ambiguity]
                    packet:
                      csvAvailable: true
                      csvHref: /api/traceability/mock-recalls/contract-fixture-ready-for-review/packet.csv
                      format: fda_style_sortable_csv
                    createdAt: "2026-05-28T00:00:00Z"
                    updatedAt: "2026-05-28T00:00:00Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/traceability/mock-recalls/{mockRecallId}/packet.csv:
    get:
      operationId: downloadMockRecallPacketCsv
      summary: Download FDA-style sortable CSV packet
      parameters: [{ $ref: "#/components/parameters/MockRecallId" }]
      responses:
        "200":
          description: CSV packet content; production export generation is future work
          content:
            text/csv:
              schema: { type: string }
              examples:
                contractFixture:
                  summary: Readiness CSV fixture for route checks
                  value: |-
                    mock_recall_id,traceability_lot_code,product_description,human_review_required,readiness_status
                    contract-fixture-ready-for-review,TLC-FC-2026-05-READY,Fresh-cut melon cup,true,ready_for_human_review
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Placeholder for future server-side auth; tenant context is derived by the server.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
    ExceptionId: { name: exceptionId, in: path, required: true, schema: { type: string } }
    SupplierRequestId: { name: supplierRequestId, in: path, required: true, schema: { type: string } }
    MockRecallId: { name: mockRecallId, in: path, required: true, schema: { type: string } }
  responses:
    Unauthorized:
      description: Authentication is missing or invalid
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
    Forbidden:
      description: Authenticated user is not allowed to access the resource
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
    NotFound:
      description: Resource not found.
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
    Conflict:
      description: Request conflicts with current resource state or idempotency history
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
    ValidationError:
      description: Request validation failed
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After: { description: Seconds to wait before retrying, schema: { type: integer, minimum: 1 } }
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } }
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
    ReviewStatus: { type: string, enum: [pending_review, needs_info, reviewed, closed] }
    SourceDocumentRef:
      type: string
      description: Metadata reference to a source document; file upload is out of scope.
    TraceLotList:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TraceLot" } }
    TraceLot:
      type: object
      required: [id, traceability_lot_code, status, human_review_required]
      properties:
        id: { type: string }
        traceability_lot_code: { type: string }
        normalized_tlc: { type: string }
        item_description: { type: string }
        status: { type: string, enum: [active, held, shipped, under_mock_recall, closed] }
        review_status: { $ref: "#/components/schemas/ReviewStatus" }
        human_review_required: { type: boolean }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
    TraceLotCreate:
      type: object
      required: [traceability_lot_code, item_description]
      properties:
        traceability_lot_code: { type: string }
        item_description: { type: string }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
        human_review_required: { type: boolean, default: false }
    TraceEventList:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TraceEvent" } }
    TraceEvent:
      type: object
      required: [id, lot_id, event_type, occurred_at, human_review_required]
      properties:
        id: { type: string }
        lot_id: { type: string }
        event_type: { type: string, enum: [receiving, transformation, shipping] }
        occurred_at: { type: string, format: date-time }
        location_ref: { type: string }
        counterparty_ref: { type: string }
        linked_lot_ids: { type: array, items: { type: string } }
        review_status: { $ref: "#/components/schemas/ReviewStatus" }
        human_review_required: { type: boolean }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
    TraceEventCreate:
      type: object
      required: [lot_id, event_type, occurred_at]
      properties:
        lot_id: { type: string }
        event_type: { type: string, enum: [receiving, transformation, shipping] }
        occurred_at: { type: string, format: date-time }
        location_ref: { type: string }
        counterparty_ref: { type: string }
        linked_lot_ids: { type: array, items: { type: string } }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
        human_review_required: { type: boolean, default: false }
    ExceptionList:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/ExceptionRecord" } }
    ExceptionRecord:
      type: object
      required: [id, type, status, human_review_required]
      properties:
        id: { type: string }
        type: { type: string, enum: [missing_kde, ambiguous_lot_code, bol_invoice_mismatch, missing_supplier_document, missing_shipping_linkage, human_review_required] }
        status: { type: string, enum: [open, in_review, resolved, deferred] }
        lot_id: { type: string }
        event_id: { type: string }
        message: { type: string }
        review_reason: { type: string, enum: [ambiguous_exemption, kill_step_review, imported_food_review, partial_exemption_review, ambiguous_lot_code, other] }
        human_review_required: { type: boolean }
        review_notes: { type: string }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
    ExceptionPatch:
      type: object
      properties:
        status: { type: string, enum: [open, in_review, resolved, deferred] }
        review_reason: { type: string, enum: [ambiguous_exemption, kill_step_review, imported_food_review, partial_exemption_review, ambiguous_lot_code, other] }
        review_notes: { type: string }
        human_review_required: { type: boolean }
    SupplierRequestList:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/SupplierRequest" } }
    SupplierRequest:
      type: object
      required: [id, supplier_ref, status]
      properties:
        id: { type: string }
        supplier_ref: { type: string }
        status: { type: string, enum: [drafted, sent, received, overdue, closed] }
        requested_kdes: { type: array, items: { type: string } }
        due_at: { type: string, format: date-time }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
    SupplierRequestCreate:
      type: object
      required: [supplier_ref, requested_kdes]
      properties:
        supplier_ref: { type: string }
        requested_kdes: { type: array, items: { type: string } }
        due_at: { type: string, format: date-time }
    SupplierRequestPatch:
      type: object
      properties:
        status: { type: string, enum: [drafted, sent, received, overdue, closed] }
        source_document_ref: { $ref: "#/components/schemas/SourceDocumentRef" }
    MockRecall:
      type: object
      required: [id, root_lot_id, status]
      properties:
        id: { type: string }
        root_lot_id: { type: string }
        status: { type: string, enum: [queued, in_review, packet_ready, closed] }
        packet_status: { type: string, enum: [not_requested, pending, ready] }
        review_status: { $ref: "#/components/schemas/ReviewStatus" }
        started_at: { type: string, format: date-time }
    MockRecallDetail:
      type: object
      required: [mockRecallId, status, scope, readinessSummary, packet, createdAt, updatedAt]
      properties:
        mockRecallId:
          type: string
          description: The mock recall identifier.
        status:
          type: string
          enum: [draft, running, ready_for_human_review, packet_ready, closed]
        scope:
          type: object
          description: Recall-readiness scope for human review, not a legal determination.
          required: [productDescription, traceabilityLotCode, dateRangeStart, dateRangeEnd]
          properties:
            productDescription: { type: string }
            traceabilityLotCode: { type: string }
            dateRangeStart: { type: string, format: date }
            dateRangeEnd: { type: string, format: date }
        readinessSummary:
          type: object
          required: [affectedLotCount, affectedShipmentCount, openExceptionCount, supplierRequestCount, humanReviewRequired, humanReviewReasons]
          properties:
            affectedLotCount: { type: integer, minimum: 0 }
            affectedShipmentCount: { type: integer, minimum: 0 }
            openExceptionCount: { type: integer, minimum: 0 }
            supplierRequestCount: { type: integer, minimum: 0 }
            humanReviewRequired: { type: boolean }
            humanReviewReasons:
              type: array
              items:
                type: string
                enum: [ambiguous_exemption, partial_exemption, imported_food_review, kill_step_review, lot_code_ambiguity, supplier_kde_gap, transformation_linkage_gap, shipping_linkage_gap]
        packet:
          type: object
          description: Future FDA-style sortable CSV export reference.
          required: [csvAvailable, csvHref, format]
          properties:
            csvAvailable: { type: boolean }
            csvHref: { type: string, format: uri-reference }
            format: { type: string, enum: [fda_style_sortable_csv] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    MockRecallCreate:
      type: object
      required: [root_lot_id]
      properties:
        root_lot_id: { type: string }
        scope_notes: { type: string }
