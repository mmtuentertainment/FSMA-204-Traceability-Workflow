name: Contract Gate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    name: Verify contract and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAPI contract
        run: npm run api:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
